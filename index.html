<!DOCTYPE html>
<html lang="zh-CN">
<head>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; }

        .standards { max-width: 900px; margin: 100px auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px; }
        .standard-item { font-size: 12px; }
        .standard-num { color: #555; }
        .modal { display: none; position: fixed; top:0; background: rgba(0,0,0,0.9); width:100%; height:100%; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        @media (max-width: 768px) { .standards { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
