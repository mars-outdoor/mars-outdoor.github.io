<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; }
        .hero { text-align: center; padding: 80px 20px; }
        .logo-svg { width: 150px; height: 150px; }
        .about-section { max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }
        .about-manifesto { font-size: 15px; line-height: 2; color: #ccc; text-align: justify; margin: 30px 0; }
        .cta-trigger { background: none; border: 1px solid #fff; color: #fff; padding: 12px 30px; cursor: pointer; }
        .standards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 40px 20px; max-width: 1000px; margin: 0 auto; }
        .standard-item { font-size: 13px; color: #888; }
        .standard-title { color: #fff; font-weight: bold; margin-bottom: 5px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; flex-direction:column; }
        .modal.active { display:flex; }
        @media (min-width: 768px) { .standards-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>
    <section class="hero">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" stroke="#fff" stroke-width="2"><circle cx="50" cy="50" r="40"/><path d="M47 55 L55 45 L62 53.5 L67.5 47" stroke="#444"/><path d="M32.5 58.5 L44.5 40 L53.5 50.5 L67.5 32.5" stroke="#fff"/><path d="M57.5 32.5 H67.5 V42.5" stroke="#fff"/></svg>
        <h1>MARS.OUTDOOR</h1>
    </section>
    <section class="about-section">
        <div class="about-manifesto">
            <p>硬核户外厂牌，主打极致纯粹探索。我们为少数行者而生。</p>
        </div>
        <button class="cta-trigger" id="ctaBtn">立即报名</button>
    </section>
    <section class="standards-grid">
        <div class="standard-item"><div class="standard-title">01 // TEAM</div>中登协领队</div>
        <div class="standard-item"><div class="standard-title">02 // MEDICAL</div>WFA荒野医疗</div>
        <div class="standard-item"><div class="standard-title">03 // COMMS</div>卫星通信</div>
        <div class="standard-item"><div class="standard-title">04 // PURITY</div>极致纯粹</div>
    </section>
    <div class="modal" id="qrModal"><img src="qrcode.jpg" style="width:200px;"><p>扫码获取路书</p></div>
    <script>
        const ctaBtn = document.getElementById('ctaBtn'), modal = document.getElementById('qrModal');
        ctaBtn.addEventListener('click', () => modal.classList.add('active'));
        modal.addEventListener('click', () => modal.classList.remove('active'));
    </script>
</body>
</html>
