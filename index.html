<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.EXPLORE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 80px 24px;
        }

        .brand-header {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0 0 24px 0;
            line-height: 1.1;
        }

        .slogan {
            font-size: 15px;
            color: #ffffff;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-bottom: 50px;
            font-weight: 300;
        }

        .cta-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 80px;
        }

        .cta-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #ffffff;
            background: transparent;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 2px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        .cta-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .standards {
            text-align: left;
            max-width: 650px;
            margin: 0 auto;
        }

        .standards-title {
            font-size: 12px;
            color: #ffffff;
            opacity: 0.3;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
            border-bottom: 1px solid #222222;
            padding-bottom: 12px;
        }

        .item {
            margin-bottom: 35px;
        }

        .item h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .item p {
            font-size: 13px;
            color: #ffffff;
            opacity: 0.55;
            line-height: 1.7;
            margin: 0;
        }

        @media screen and (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }
            .brand-header {
                font-size: 32px;
            }
            .slogan {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 完美还原原本的英文标题 -->
        <h1 class="brand-header">MARS.EXPLORE</h1>

        <!-- 原版纯净标语 -->
        <div class="slogan">步入极致纯粹 · 去旷野寻找你的火星</div>

        <!-- 完美找回原汁原味的跳转与原版微信直接拉起逻辑 -->
        <div class="cta-wrapper">
            <a href="https://wechat.com" class="cta-btn" target="_blank">立即报名 / 获取路书 ⚡</a>
        </div>

        <!-- 原版硬核安全标准板块 -->
        <div class="standards">
            <div class="standards-title">硬核安全 / Standards</div>

            <div class="item">
                <h3>中登协认证领队</h3>
                <p>所有路线均由中国登山协会认证的专业户外指导员全程带队，拒绝盲目探险。</p>
            </div>

            <div class="item">
                <h3>WFA 荒野医疗保障</h3>
                <p>领队均具备国际标准荒野第一响应者（WFA）资质，随身配备专业医疗应急包。</p>
            </div>

            <div class="item">
                <h3>卫星通信覆盖</h3>
                <p>无人区及弱信号区域全员配备北斗卫星通信终端，确保实时轨迹追踪与安全连接。</p>
            </div>

            <div class="item">
                <h3>极致纯粹体验</h3>
                <p>独立踩线，严格控制成团人数，100%无商业购物，只有极致与纯粹的荒野探索。</p>
            </div>
        </div>

    </div>

</body>
</html>
