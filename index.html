<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR | REMOTE WILDERNESS EXPERIENCE</title>
    <style>
        /* 极致简约硬核户外风格 CSS 样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .hero-section { display: flex; flex-direction: column; align-items: center; padding: 100px 20px 50px; text-align: center; }
        .brand-logo-wrapper { width: 150px; height: 150px; margin-bottom: 30px; }
        .logo-svg { width: 100%; height: 100%; }
        .brand-title { font-size: 32px; font-weight: 700; letter-spacing: 6px; margin-bottom: 10px; }
        .brand-subtitle { font-size: 12px; color: #777; letter-spacing: 3px; }
        .about-section { max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: justify; }
        .about-manifesto { font-size: 15px; line-height: 2; color: #ccc; }
        .cta-container { text-align: center; margin: 60px 0; }
        .cta-trigger { background: #000; color: #fff; border: 1px solid #fff; padding: 15px 40px; cursor: pointer; transition: 0.3s; }
        .cta-trigger:hover { background: #fff; color: #000; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.active { display: flex; }
        .qr-image { width: 200px; height: 200px; }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="brand-logo-wrapper">
            <svg class="logo-svg" viewBox="0 0 100 100" fill="none" stroke="#fff" stroke-width="2">
                <circle cx="50" cy="50" r="40"/>
                <path d="M35 50 L45 40 L55 50 L65 40" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1 class="brand-title">MARS.OUTDOOR</h1>
        <p class="brand-subtitle">REMOTE WILDERNESS EXPERIENCE</p>
    </section>
    <section class="about-section">
        <div class="about-manifesto">
            <p>起源于 2019.08 / 中国·重庆。火星户外探索频道（MARS.OUTDOOR）作为独立硬核户外厂牌...</p>
        </div>
        <div class="cta-container">
            <button class="cta-trigger" id="ctaBtn">立即报名 / 获取路书 ⚡</button>
        </div>
    </section>
    <div class="modal-overlay" id="qrModal">
        <img src="qrcode.jpg" alt="QR Code" class="qr-image">
    </div>
    <script>
        const btn = document.getElementById('ctaBtn');
        const modal = document.getElementById('qrModal');
        btn.addEventListener('click', () => modal.classList.toggle('active'));
        modal.addEventListener('click', () => modal.classList.remove('active'));
    </script>
</body>
</html>
