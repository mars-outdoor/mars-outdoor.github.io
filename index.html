<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>火星户外探索频道 | MARS.OUTDOOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .hero { text-align: center; padding: 100px 20px; }
        .title-cn { font-size: 24px; letter-spacing: 5px; }
        .title-en { font-size: 28px; font-weight: bold; }
        .content { max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.8; color: #ccc; }
        .standards { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .item { border: 1px solid #333; padding: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; }
        .modal.active { display: flex; }
    </style>
</head>
<body>
    <section class="hero"><h1>火星户外探索频道</h1><p>MARS.OUTDOOR</p></section>
    <section class="content">
        <p>火星户外探索频道（MARS.OUTDOOR）专注硬核户外。我们坚持纯粹体验，不仅有中登协领队、WFA荒野医疗资质，还提供卫星通信保障，打造极致探险。</p>
        <button id="ctaBtn" style="margin-top:20px; padding:10px 20px;">获取路书</button>
    </section>
    <section class="standards">
        <div class="item"><h3>01.中登协领队</h3></div>
        <div class="item"><h3>02.WFA医疗</h3></div>
        <div class="item"><h3>03.卫星通信</h3></div>
        <div class="item"><h3>04.独立路线</h3></div>
    </section>
    <div class="modal" id="qrModal"><p>扫码获取路书</p></div>
    <script>
        const ctaBtn = document.getElementById('ctaBtn');
        const qrModal = document.getElementById('qrModal');
        ctaBtn.addEventListener('click', () => qrModal.classList.add('active'));
        qrModal.addEventListener('click', () => qrModal.classList.remove('active'));
    </script>
</body>
</html>
