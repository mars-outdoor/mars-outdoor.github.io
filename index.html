<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR | REMOTE WILDERNESS EXPERIENCE</title>
    <style>
        /* 全局大牌克制风样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 80px 24px 60px 24px;
            overflow-x: hidden;
        }

        /* 核心品牌标识区 */
        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        /* 原生复刻的商标图形 */
        .logo-svg {
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 6px;
            line-height: 1;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .brand-subtitle {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #888888;
            text-transform: uppercase;
        }

        /* 核心交互按钮 */
        .cta-trigger {
            background: none;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 14px 36px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 48px;
            position: relative;
            z-index: 10;
        }

        /* 4项硬核安全标准 */
        .standards-grid {
            width: 100%;
            max-width: 960px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            margin-top: auto;
            border-top: 1px solid #222222;
            padding-top: 40px;
        }

        .standard-item {
            display: flex;
            flex-direction: column;
        }

        .standard-num {
            font-size: 12px;
            font-family: monospace;
            color: #444444;
            margin-bottom: 8px;
        }

        .standard-text {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            color: #cccccc;
            line-height: 1.6;
        }

        /* 弹窗组件：克制大牌风，无多余边框与背景 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .qr-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            margin-bottom: 24px;
            filter: grayscale(100%);
        }

        .qr-caption {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #888888;
        }

        /* 移动端适配适配 */
        @media (max-width: 768px) {
            body {
                padding: 60px 20px 40px 20px;
            }
            .brand-title {
                font-size: 26px;
                letter-spacing: 4px;
            }
            .standards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
                padding-top: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- 核心品牌标识区 -->
    <div class="brand-container">
        <!-- 1:1 原生代码复刻的 MARS.OUTDOOR 商标 -->
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://w3.org">
            <circle cx="50" cy="50" r="40" stroke="#ffffff" stroke-width="2"/>
            <path d="M30 65 L45 40 L55 55 L70 30" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M63 30 H70 V37" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M43 62 L52 50 L58 58 L68 44" stroke="#444444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        
        <h1 class="brand-title">MARS.OUTDOOR</h1>
        <p class="brand-subtitle">REMOTE WILDERNESS EXPERIENCE</p>
        
        <!-- 核心交互组件 -->
        <button class="cta-trigger" id="ctaBtn">立即报名 / 获取路书 ⚡</button>
    </div>

    <!-- 4项硬核安全标准 -->
    <div class="standards-grid">
        <div class="standard-item">
            <span class="standard-num">01 //</span>
            <span class="standard-text">中登协领队</span>
        </div>
        <div class="standard-item">
            <span class="standard-num">02 //</span>
            <span class="standard-text">WFA荒野医疗</span>
        </div>
        <div class="standard-item">
            <span class="standard-num">03 //</span>
            <span class="standard-text">卫星通信</span>
        </div>
        <div class="standard-item">
            <span class="standard-num">04 //</span>
            <span class="standard-text">极致纯粹体验</span>
        </div>
    </div>

    <!-- 隐蔽弹窗层 -->
    <div class="modal-overlay" id="qrModal">
        <img src="qrcode.jpg" alt="QR Code" class="qr-image">
        <p class="qr-caption">微信扫码 · 获取官方路书</p>
    </div>

    <script>
        const ctaBtn = document.getElementById('ctaBtn');
        const qrModal = document.getElementById('qrModal');

        // 检测是否为移动端
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (!isMobile) {
            // PC端：鼠标悬停触发，移开消失
            ctaBtn.addEventListener('mouseenter', () => {
                qrModal.classList.add('active');
            });
            ctaBtn.addEventListener('mouseleave', () => {
                qrModal.classList.remove('active');
            });
        } else {
            // 手机端：点击（onclick）触发，再次点击任意处关闭
            ctaBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                qrModal.classList.add('active');
            });
            qrModal.addEventListener('click', () => {
                qrModal.classList.remove('active');
            });
        }
    </script>
</body>
</html>
