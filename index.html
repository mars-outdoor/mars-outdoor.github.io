<!-- 
==========================================================================
【MARS.OUTDOOR 官方源码极简大牌美学锁死备注 - 严禁 AI 随意重构】
1. 品牌美学：主标题已由 EXPLORE 改为 MARS.OUTDOOR。删除了所有多余中文标签。
2. 标志设计：顶部完美融入第一版高级大牌感（Arc'teryx 风格）纯白极简流线山脉剪影 SVG 标志，文字在下方独立呈现。
3. 全局样式：纯黑底（#000000）、纯白字。走类似始祖鸟、Patagonia 的旷野冷峻极简风。
4. 核心功能：
   - 报名按钮（.cta-btn）与二维码盒子（.qr-box）一体化。
   - 电脑端靠 :hover 悬停平滑浮现；手机端靠绑定的 toggleQRCode(event) 触控点击弹出。
   - 二维码关联路径必须锁死为：qrcode.jpg（不可错写为 png）。
   - 二维码下方专属高级文案确定为选项C：“微信扫码 · 获取官方路书”。
5. 下方板块：原汁原味锁死四项硬核安全（中登协、WFA医疗、卫星、纯粹体验），严禁擅自修改字句或套用方框网格。
==========================================================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 80px 24px;
        }

        /* 🏔️ 完美退回：第一版高山大牌风极简流线山峦 SVG 标志样式 */
        .brand-logo-svg {
            width: 75px;
            height: 45px;
            margin-bottom: 25px;
            opacity: 0.95;
            display: inline-block;
        }

        .brand-header {
            font-size: 42px; 
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0 0 24px 0;
            line-height: 1.1;
        }

        .slogan {
            font-size: 15px;
            color: #ffffff;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-bottom: 50px;
            font-weight: 300;
        }

        .cta-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 80px;
        }

        .cta-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #ffffff;
            background: transparent;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 2px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            outline: none;
        }

        @media (min-width: 769px) {
            .cta-wrapper:hover .qr-box {
                display: block !important;
            }
        }

        .qr-box {
            display: none; 
            position: absolute;
            top: 105%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #111111;
            border: 1px solid #333333;
            padding: 14px;
            border-radius: 4px;
            z-index: 999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .qr-box.show-active {
            display: block !important;
        }

        .qr-box img {
            width: 140px;
            height: 140px;
            display: block;
        }

        .qr-box p {
            margin: 8px 0 0 0;
            color: #ffffff;
            opacity: 0.6;
            font-size: 11px;
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
        }

        .standards {
            text-align: left;
            max-width: 650px;
            margin: 0 auto;
        }

        .standards-title {
            font-size: 12px;
            color: #ffffff;
            opacity: 0.3;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
            border-bottom: 1px solid #222222;
            padding-bottom: 12px;
        }

        .item {
            margin-bottom: 35px;
        }

        .item h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .item p {
            font-size: 13px;
            color: #ffffff;
            opacity: 0.55;
            line-height: 1.7;
            margin: 0;
        }

        @media screen and (max-width: 768px) {
            .container { padding: 40px 20px; }
            .brand-header { font-size: 32px; }
            .slogan { font-size: 13px; }
            .brand-logo-svg { width: 65px; height: 39px; margin-bottom: 18px; }
            .qr-box {
                position: relative;
                top: 0;
                left: 0;
                transform: none;
                margin: 15px auto 0 auto;
                background: transparent;
                border: none;
                padding: 0;
                box-shadow: none;
            }
            .qr-box img { width: 140px; height: 140px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 🏔️ 完美还原：富有呼吸美学手感的极简高山流线剪影图章 -->
        <svg class="brand-logo-svg" viewBox="0 0 100 50" fill="none" xmlns="http://w3.org">
            <!-- 远景微型山脊 -->
            <path d="M5 45 L25 32 L40 45" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.3"/>
            <!-- 次主峰等高线 -->
            <path d="M20 45 L48 18 L65 38 L85 45" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.5"/>
            <!-- 核心主断崖山巅骨架 -->
            <path d="M12 45 Q35 25 48 8 Q55 22 58 18 Q66 32 90 45" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <!-- 独立的文本大标题，保障最干净的视觉对齐 -->
        <h1 class="brand-header">MARS.OUTDOOR</h1>

        <div class="slogan">步入极致纯粹 · 去旷野寻找你的火星</div>

        <div class="cta-wrapper">
            <button class="cta-btn" onclick="toggleQRCode(event)">立即报名 / 获取路书 ⚡</button>
            <div class="qr-box" id="qrBox">
                <img src="qrcode.jpg" alt="微信二维码">
                <p>微信扫码 · 获取官方路书</p>
            </div>
        </div>

        <div class="standards">
            <div class="standards-title">硬核安全 / Standards</div>

            <div class="item">
                <h3>中登协认证领队</h3>
                <p>所有路线均由中国登山协会认证的专业户外指导员全程带队，拒绝盲目探险。</p>
            </div>

            <div class="item">
                <h3>WFA 荒野医疗保障</h3>
                <p>领队均具备国际标准荒野第一响应者（WFA）资质，随身配备专业医疗应急包。</p>
            </div>

            <div class="item">
                <h3>卫星通信覆盖</h3>
                <p>无人区及弱信号区域全员配备北斗卫星通信终端，确保实时轨迹追踪与安全连接。</p>
            </div>

            <div class="item">
                <h3>极致纯粹体验</h3>
                <p>独立踩线，严格控制成团人数，100%无商业购物，只有极致与纯粹的荒野探索。</p>
            </div>
        </div>

    </div>

    <script>
        function toggleQRCode(event) {
            event.stopPropagation();
            var qr = document.getElementById('qrBox');
            if (qr.classList.contains('show-active')) {
                qr.classList.remove('show-active');
            } else {
                qr.classList.add('show-active');
            }
        }
        document.addEventListener('click', function() {
            var qr = document.getElementById('qrBox');
            if (qr) {
                qr.classList.remove('show-active');
            }
        });
    </script>

</body>
</html>
