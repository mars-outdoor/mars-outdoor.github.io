<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR | REMOTE WILDERNESS EXPERIENCE</title>
    <style>
        /* 极致大牌风：纯黑背景，抗锯齿，全面消除内外边距 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        /* 垂直居中头部，包含LOGO和品牌名 */
        .hero-section { width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .brand-logo-wrapper { width: 150px; height: 150px; margin-bottom: 20px; }
        .logo-svg { width: 100%; height: 100%; }
        .brand-title { font-size: 36px; font-weight: 700; letter-spacing: 8px; margin-bottom: 10px; text-transform: uppercase; }
        .brand-subtitle { font-size: 12px; letter-spacing: 5px; color: #777; text-transform: uppercase; }
        /* 探索内容区，适配移动端 */
        .about-section { max-width: 800px; margin: 0 auto; padding: 60px 24px; text-align: center; }
        .about-tag { font-size: 12px; font-family: monospace; color: #444; letter-spacing: 4px; margin-bottom: 40px; display: block; }
        .about-manifesto { font-size: 16px; font-weight: 300; line-height: 2; color: #ccc; text-align: justify; margin-bottom: 60px; }
        .cta-trigger { background: none; border: 1px solid #fff; color: #fff; padding: 15px 40px; font-size: 14px; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
        .cta-trigger:hover { background-color: #fff; color: #000; }
        /* 底部信息 */
        .footer-section { max-width: 1100px; margin: 0 auto; padding: 40px 24px; border-top: 1px solid #222; text-align: center; }
        .footer-text { font-size: 11px; color: #555; line-height: 1.6; }
        @media (max-width: 768px) {
            .brand-title { font-size: 28px; }
            .about-manifesto { font-size: 14px; }
        }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="brand-logo-wrapper">
            <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://w3.org">
                <circle cx="50" cy="50" r="40" stroke="#fff" stroke-width="2"/>
                <path d="M40 60 L50 40 L60 55 L70 35" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1 class="brand-title">MARS.OUTDOOR</h1>
        <p class="brand-subtitle">REMOTE WILDERNESS EXPERIENCE</p>
    </section>
    <section class="about-section">
        <span class="about-tag">ABOUT // 探索独白</span>
        <div class="about-manifesto">
            <p>火星户外（MARS.OUTDOOR）致力于极致硬核的野外探索体验。我们追求纯粹的自然连接，在旷野中寻找冷峻独立的精神坐标。这是对意志的淬炼，也是对孤独的坚守。</p>
        </div>
        <button class="cta-trigger">立即探索 · 登录火星</button>
    </section>
    <footer class="footer-section">
        <p class="footer-text">© 2024 MARS.OUTDOOR. ALL RIGHTS RESERVED.</p>
    </footer>
</body>
</html>
