<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR | 火星户外探索频道</title>
    <style>
        /* 极致黑底纯白文字，全面优化排版 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        
        /* 头部品牌区 */
        .hero-section { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 100px 20px 40px 20px; text-align: center; }
        .brand-title { font-size: 32px; font-weight: 800; letter-spacing: 6px; line-height: 1.1; text-transform: uppercase; }
        .brand-title-cn { font-size: 16px; font-weight: 500; letter-spacing: 4px; color: #ffffff; margin-top: 12px; }
        .brand-subtitle { font-size: 11px; font-weight: 400; letter-spacing: 4px; color: #777777; margin-top: 16px; text-transform: uppercase; }
        
        /* 探索独白模块 */
        .about-section { width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; }
        .about-tag { font-size: 11px; font-family: monospace; color: #555555; letter-spacing: 3px; margin-bottom: 24px; display: block; text-align: center; }
        .about-manifesto { font-size: 15px; font-weight: 300; line-height: 2.2; color: #cccccc; text-align: justify; }
        .manifesto-paragraph { margin-bottom: 20px; }

        /* 核心交互按钮 */
        .cta-container { width: 100%; display: flex; justify-content: center; margin: 60px 0 80px 0; }
        .cta-trigger { background: none; border: 1px solid #ffffff; color: #ffffff; padding: 14px 36px; font-size: 14px; font-weight: 500; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; }
        .cta-trigger:hover { background-color: #ffffff; color: #000000; }

        /* 底部 */
        .footer-section { width: 100%; max-width: 1100px; margin: 0 auto; padding: 40px 20px; border-top: 1px solid #111111; text-align: center; }
        .footer-text { font-size: 11px; color: #444444; line-height: 1.6; letter-spacing: 1px; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .brand-title { font-size: 26px; }
            .brand-title-cn { font-size: 14px; }
        }
    </style>
</head>
<body>
    <section class="hero-section">
        <h1 class="brand-title">MARS.OUTDOOR</h1>
        <h2 class="brand-title-cn">火星户外探索频道</h2>
        <p class="brand-subtitle">REMOTE WILDERNESS EXPERIENCE</p>
    </section>
    <section class="about-section">
        <span class="about-tag">ABOUT // 探索独白</span>
        <div class="about-manifesto">
            <p class="manifesto-paragraph">起源于 2019.08 / 中国·重庆。火星户外探索频道（MARS.OUTDOOR）作为独立硬核户外厂牌，是一场关于地理边界与个体意志的闭环对冲。</p>
            <p class="manifesto-paragraph">步入极致纯粹，卸下文明的伪饰，去旷野，寻找你的火星。火星不是远方的庇护所，而是深埋于你体内的那座不妥协、不跟风、冷峻且独立的精神坐标。</p>
        </div>
        <div class="cta-container">
            <button class="cta-trigger">立即报名 / 获取路书 ⚡</button>
        </div>
    </section>
    <footer class="footer-section">
        <p class="footer-text">© 2026 MARS.OUTDOOR. ALL RIGHTS RESERVED.</p>
    </footer>
</body>
</html>
