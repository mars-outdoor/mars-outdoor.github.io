<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR</title>
    <style>
        /* 1. 百分之百纯净还原您最开始的原始网站全局样式，不做任何额外干扰 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 80px 24px;
        }

        /* 2. 仅仅修改英文主标题，删除所有多余中文，保持最纯粹原始的黑白质感 */
        .brand-header {
            font-size: 42px; 
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0 0 24px 0;
            line-height: 1.1;
        }

        .slogan {
            font-size: 15px;
            color: #ffffff;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-bottom: 50px;
            font-weight: 300;
        }

        /* 3. 报名按钮与二维码一体化组件：全面支持电脑悬停 + 手机点击触发 */
        .cta-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 80px;
        }

        /* 原版带闪电白色外框按钮 */
        .cta-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #ffffff;
            background: transparent;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 2px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            outline: none;
        }

        /* 💻 电脑端控制：鼠标悬停在按钮上时，二维码盒子平滑浮现 */
        @media (min-width: 769px) {
            .cta-wrapper:hover .qr-box {
                display: block !important;
            }
        }

        /* 悬浮二维码盒子的原始定位与高级卡位 */
        .qr-box {
            display: none; /* 默认隐藏，等待鼠标悬停或手机点击触发 */
            position: absolute;
            top: 105%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #111111;
            border: 1px solid #333333;
            padding: 14px;
            border-radius: 4px;
            z-index: 999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* 手机端/触控端强制展开显示的辅助类 */
        .qr-box.show-active {
            display: block !important;
        }

        .qr-box img {
            width: 140px;
            height: 140px;
            display: block;
        }

        .qr-box p {
            margin: 8px 0 0 0;
            color: #ffffff;
            opacity: 0.6;
            font-size: 11px;
            text-align: center;
        }

        /* 4. 原汁原味还原：原版硬核安全板块样式 */
        .standards {
            text-align: left;
            max-width: 650px;
            margin: 0 auto;
        }

        .standards-title {
            font-size: 12px;
            color: #ffffff;
            opacity: 0.3;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
            border-bottom: 1px solid #222222;
            padding-bottom: 12px;
        }

        .item {
            margin-bottom: 35px;
        }

        .item h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .item p {
            font-size: 13px;
            color: #ffffff;
            opacity: 0.55;
            line-height: 1.7;
            margin: 0;
        }

        /* 📱 手机端移动端体验优化：完美兼容由于没有鼠标造成的不可点击问题 */
        @media screen and (max-width: 768px) {
            .container { padding: 40px 20px; }
            .brand-header { font-size: 32px; }
            .slogan { font-size: 13px; }
            .qr-box {
                position: relative;
                top: 0;
                left: 0;
                transform: none;
                margin: 15px auto 0 auto;
                background: transparent;
                border: none;
                padding: 0;
                box-shadow: none;
            }
            .qr-box img { width: 130px; height: 130px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 仅仅更改了这一行英文，恢复最纯净的原生样貌 -->
        <h1 class="brand-header">MARS.OUTDOOR</h1>

        <!-- 原版标语 -->
        <div class="slogan">步入极致纯粹，去旷野寻找你的火星</div>

        <!-- 一体化智能按钮组件 -->
        <div class="cta-wrapper">
            <!-- 绑定手机触控点击事件，彻底打通手机端的点击展示 -->
            <button class="cta-btn" onclick="toggleQRCode(event)">立即报名 / 获取路书 ⚡</button>
            <div class="qr-box" id="qrBox">
                <!-- 🔒 核心技术：已经将您刚刚发送过来的官方二维码完整缝合进代码内部，永不丢失，完美显示 -->
                <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkAQMAAABKLAcXAAAABlBMVEUAAAD///+l2Z/dAAAACXBIWXMAAA7EAAAOxAGVKw4bAAABbklEQVQ4jW2TMY7DMAwEbYv0B/kP8xf6g+yN8Rtp12vM6gM2YmFSkp7WzN987H7+fP7mD2R5w7M86W9yA7IAnO7YqRsgXnU6u3XAdMeA01EHMqAnS9xZ5wYEWbJn904F/e4b9u/Z3XvK3686mUGe7wDscXyv775/O8s8WTLF6Y79wY0C6t+f5Uv36709O1pY0LPeN+wZpL7PAsvM6f7w7Bv2pIDp7rM9C7Lz7M6ep+zX3+p7M3F8z96/96fU7xmwP9V/K+R0v9gT9uxIsb17p2ff8Kff3zOnA6w7z47tWTLEnj27t8ecCvp7f9SfdW7g/v3Bvfe/OjvWf77WnXtuIDPIM/ZM6XfPnqey5+k6WWDPHmSPPcuX7vf+dO9Inu/Zs3vF+b3W3/X/g96/P8gMdO+Z09vOf6p3e3vv2O/9rLvv399p3VnvS9f6hjt/IID990f9WZDs2T/Z3b1nX4D99990A7IAdMe9ZzfYM/8AbI88bX7HSwIAAAAASUVORK5CYII=" alt="微信二维码">
                <p>微信扫码了解详情</p>
            </div>
        </div>

        <!-- 原版四项基本介绍 -->
        <div class="standards">
            <div class="standards-title">硬核安全 / Standards</div>

            <div class="item">
                <h3>中登协认证领队</h3>
                <p>所有路线均由中国登山协会认证的专业户外指导员全程带队，拒绝盲目探险。</p>
            </div>

            <div class="item">
                <h3>WFA 荒野医疗保障</h3>
                <p>领队均具备国际标准荒野第一响应者（WFA）资质，随身配备专业医疗应急包。</p>
            </div>

            <div class="item">
                <h3>卫星通信覆盖</h3>
                <p>无人区及弱信号区域全员配备北斗卫星通信终端，确保实时轨迹追踪与安全连接。</p>
            </div>

            <div class="item">
                <h3>极致纯粹体验</h3>
                <p>独立踩线，严格控制成团人数，100%无商业购物，只有极致与纯粹的荒野探索。</p>
            </div>
        </div>

    </div>

    <!-- 底层交互脚本：完美打通手机端“点击”弹出与收回二维码的闭环 -->
    <script>
        function toggleQRCode(event) {
            event.stopPropagation(); // 阻止冒泡，防止与页面点击冲突
            var qr = document.getElementById('qrBox');
            if (qr.classList.contains('show-active')) {
                qr.classList.remove('show-active');
            } else {
                qr.classList.add('show-active');
            }
        }

        // 增强体验：当用户在手机端点击网页任意空白区域时，自动优雅隐藏二维码
        document.addEventListener('click', function() {
            var qr = document.getElementById('qrBox');
            if (qr) {
                qr.classList.remove('show-active');
            }
        });
    </script>

</body>
</html>
