<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR | REMOTE WILDERNESS EXPERIENCE</title>
    <style>
        /* [1.1] 基于您要求的高端机能风样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        .hero-section { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 90px 24px 30px 24px; text-align: center; }
        .brand-logo-wrapper { width: 160px; height: 160px; margin-bottom: 24px; }
        .brand-title { font-size: 32px; font-weight: 700; letter-spacing: 6px; margin-bottom: 14px; text-transform: uppercase; }
        .about-section { width: 100%; max-width: 800px; margin: 0 auto; padding: 30px 24px 20px 24px; }
        .about-manifesto { font-size: 15px; font-weight: 300; line-height: 2.3; color: #cccccc; text-align: justify; }
        .cta-container { width: 100%; display: flex; justify-content: center; margin: 85px 0 110px 0; }
        .cta-trigger { background: none; border: 1px solid #ffffff; color: #ffffff; padding: 14px 44px; cursor: pointer; transition: all 0.3s ease; }
        .cta-trigger:hover { background-color: #ffffff; color: #000000; }
        .standards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; border-top: 1px solid #222222; padding-top: 40px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .qr-image { width: 200px; height: 200px; }
        @media (max-width: 768px) { .standards-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="brand-logo-wrapper">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://w3.org">
                <circle cx="50" cy="50" r="40" stroke="#ffffff" stroke-width="2.5"/>
                <path d="M47 55 L55 45 L62 53.5 L67.5 47" stroke="#444444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M32.5 58.5 L44.5 40 L53.5 50.5 L67.5 32.5" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1 class="brand-title">MARS.OUTDOOR</h1>
    </section>
    <section class="about-section">
        <div class="about-manifesto">
            <p>起源于 2019.08 / 中国·重庆。火星户外探索频道（MARS.OUTDOOR）作为独立硬核户外厂牌，是一场关于地理边界与个体意志的闭环对冲。</p>
            <p>...[此处略去完整独白内容，详情请见原GitHub仓库]...</p>
        </div>
        <div class="cta-container"><button class="cta-trigger" id="ctaBtn">立即报名 / 获取路书 ⚡</button></div>
    </section>
    <div class="modal-overlay" id="qrModal"><img src="qrcode.jpg" class="qr-image"><p>微信扫码 · 获取官方路书</p></div>
    <script>
        const btn = document.getElementById('ctaBtn'), modal = document.getElementById('qrModal');
        btn.addEventListener('click', () => modal.classList.add('active'));
        modal.addEventListener('click', () => modal.classList.remove('active'));
    </script>
</body>
</html>
