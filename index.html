<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS.OUTDOOR</title>
    <style>
        /* 1. 百分之百纯净还原您最开始的原始网站全局样式 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 80px 24px;
        }

        /* 2. 仅仅微调您的新主标题：只改英文，删除中文，保留大牌纯粹感 */
        .brand-header {
            font-size: 42px; /* 恢复您原版极具张力的大字号 */
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0 0 24px 0;
            line-height: 1.1;
        }

        .slogan {
            font-size: 15px;
            color: #ffffff;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-bottom: 50px;
            font-weight: 300;
        }

        /* 3. 完美复原：带二维码悬停触发的原版按钮组件 */
        .cta-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 80px;
        }

        /* 原版白框带闪电报名按钮 */
        .cta-btn {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid #ffffff;
            background: transparent;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 2px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        /* 鼠标移上去时，隐藏的二维码盒子会显示出来 */
        .cta-wrapper:hover .qr-box {
            display: block;
        }

        /* 原版悬浮二维码定位盒子 */
        .qr-box {
            display: none;
            position: absolute;
            top: 105%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #111111;
            border: 1px solid #333333;
            padding: 14px;
            border-radius: 4px;
            z-index: 999;
        }

        .qr-box img {
            width: 140px;
            height: 140px;
            display: block;
        }

        .qr-box p {
            margin: 8px 0 0 0;
            color: #ffffff;
            opacity: 0.6;
            font-size: 11px;
            text-align: center;
        }

        /* 4. 原版纯净硬核安全板块样式 */
        .standards {
            text-align: left;
            max-width: 650px;
            margin: 0 auto;
        }

        .standards-title {
            font-size: 12px;
            color: #ffffff;
            opacity: 0.3;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
            border-bottom: 1px solid #222222;
            padding-bottom: 12px;
        }

        .item {
            margin-bottom: 35px;
        }

        .item h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .item p {
            font-size: 13px;
            color: #ffffff;
            opacity: 0.55;
            line-height: 1.7;
            margin: 0;
        }

        /* 手机端响应式自动回退（保障手机上按钮和二维码体验） */
        @media screen and (max-width: 768px) {
            .container { padding: 40px 20px; }
            .brand-header { font-size: 32px; }
            .slogan { font-size: 13px; }
            .qr-box {
                display: block;
                position: relative;
                top: 0;
                left: 0;
                transform: none;
                margin: 15px auto 0 auto;
                background: transparent;
                border: none;
                padding: 0;
            }
            .qr-box img { width: 120px; height: 120px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 仅仅修改了这行英文，没有任何多余中文打扰 -->
        <h1 class="brand-header">MARS.OUTDOOR</h1>

        <!-- 原版标语 -->
        <div class="slogan">步入极致纯粹，去旷野寻找你的火星</div>

        <!-- 完好如初的立即报名组件与二维码，请确保根目录下有 qrcode.png 文件 -->
        <div class="cta-wrapper">
            <button class="cta-btn">立即报名 / 获取路书 ⚡</button>
            <div class="qr-box">
                <img src="qrcode.png" alt="微信二维码">
                <p>微信扫码了解详情</p>
            </div>
        </div>

        <!-- 原版四项基本介绍 -->
        <div class="standards">
            <div class="standards-title">硬核安全 / Standards</div>

            <div class="item">
                <h3>中登协认证领队</h3>
                <p>所有路线均由中国登山协会认证的专业户外指导员全程带队，拒绝盲目探险。</p>
            </div>

            <div class="item">
                <h3>WFA 荒野医疗保障</h3>
                <p>领队均具备国际标准荒野第一响应者（WFA）资质，随身配备专业医疗应急包。</p>
            </div>

            <div class="item">
                <h3>卫星通信覆盖</h3>
                <p>无人区及弱信号区域全员配备北斗卫星通信终端，确保实时轨迹追踪与安全连接。</p>
            </div>

            <div class="item">
                <h3>极致纯粹体验</h3>
                <p>独立踩线，严格控制成团人数，100%无商业购物，只有极致与纯粹的荒野探索。</p>
            </div>
        </div>

    </div>

</body>
</html>
